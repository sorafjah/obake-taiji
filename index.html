<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>夜霧の魔法城 〜除霊脱出〜</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100dvh; overflow:hidden; background:#05050a;
    font-family:"BIZ UDPGothic","Hiragino Sans",sans-serif; touch-action:none;
    -webkit-user-select:none; user-select:none; }
  #app { position:fixed; inset:0; }
  canvas { display:block; }

  /* ---- スタート画面 ---- */
  #startOverlay { position:fixed; inset:0; z-index:50; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:22px; text-align:center;
    background:radial-gradient(ellipse at 50% 35%, #17142e 0%, #0a0916 55%, #030308 100%); color:#e8e2d0;
    transition:opacity .8s; padding:20px; }
  #startOverlay.hidden { opacity:0; pointer-events:none; }
  #startOverlay h1 { font-size:clamp(26px,5vw,44px); letter-spacing:.18em; font-weight:700;
    text-shadow:0 0 24px rgba(255,215,130,.45), 0 0 60px rgba(120,90,255,.3); }
  #startOverlay .sub { font-size:clamp(13px,2.2vw,16px); color:#b9b0d8; letter-spacing:.1em; }
  #startBtn { margin-top:8px; padding:15px 52px; font-size:18px; letter-spacing:.14em; cursor:pointer;
    color:#ffe9b8; background:linear-gradient(180deg,#3a2f66,#241c45); border:1px solid #8f7bd8;
    border-radius:10px; box-shadow:0 0 18px rgba(140,110,255,.35), inset 0 1px 0 rgba(255,255,255,.15);
    font-family:inherit; transition:transform .15s, box-shadow .15s; }
  #startBtn:hover { transform:translateY(-2px); box-shadow:0 0 28px rgba(150,120,255,.55); }
  #startOverlay .help { font-size:13px; line-height:2; color:#8f88ad; }
  #startOverlay .help b { color:#d8cfa8; font-weight:700; }
  #loadingMsg { font-size:13px; color:#7a72a0; }

  /* ---- HUD ---- */
  #hud { position:fixed; inset:0; z-index:10; pointer-events:none; }
  #crosshair { position:absolute; left:50%; top:50%; width:6px; height:6px; margin:-3px 0 0 -3px;
    border-radius:50%; background:rgba(255,240,200,.85); box-shadow:0 0 6px rgba(255,230,170,.8); }
  #roomName { position:absolute; top:26px; left:50%; transform:translateX(-50%);
    font-size:clamp(16px,2.6vw,22px); letter-spacing:.22em; color:#f0e6c8; opacity:0;
    text-shadow:0 0 14px rgba(0,0,0,.9), 0 0 26px rgba(255,210,120,.35); transition:opacity .6s; }
  #secretCount { position:absolute; top:16px; right:16px; font-size:13px; color:#cfc6e8;
    background:rgba(10,8,24,.55); border:1px solid rgba(150,130,220,.35); border-radius:8px;
    padding:6px 12px; letter-spacing:.08em; }
  #prompt { position:absolute; left:50%; bottom:24%; transform:translateX(-50%);
    font-size:15px; color:#ffe9b0; background:rgba(12,10,26,.7); border:1px solid rgba(255,220,140,.4);
    border-radius:8px; padding:8px 18px; letter-spacing:.1em; opacity:0; transition:opacity .25s;
    text-shadow:0 0 8px rgba(0,0,0,.8); }
  #toast { position:absolute; left:50%; top:38%; transform:translateX(-50%) scale(.9);
    font-size:clamp(16px,3vw,22px); color:#ffe27a; letter-spacing:.14em; opacity:0;
    text-shadow:0 0 18px rgba(255,190,60,.7), 0 2px 6px rgba(0,0,0,.9);
    transition:opacity .5s, transform .5s; white-space:nowrap; }
  #toast.show { opacity:1; transform:translateX(-50%) scale(1); }
  #controlsHint { position:absolute; bottom:14px; left:16px; font-size:12px; color:rgba(200,195,220,.55);
    line-height:1.9; letter-spacing:.05em; }
  #audioBtn { position:absolute; bottom:14px; right:16px; pointer-events:auto; cursor:pointer;
    width:44px; height:44px; border-radius:50%; border:1px solid rgba(160,140,230,.4);
    background:rgba(14,12,30,.6); color:#d8d0f0; font-size:19px; }
  #pauseOverlay { position:fixed; inset:0; z-index:40; display:none; align-items:center; justify-content:center;
    background:rgba(4,4,10,.55); color:#e0d8f5; font-size:18px; letter-spacing:.15em; cursor:pointer;
    backdrop-filter:blur(2px); }

  /* ---- タッチUI ---- */
  .touchUI { display:none; }
  body.touch .touchUI { display:block; }
  body.touch #controlsHint { display:none; }
  #joyBase { position:fixed; z-index:20; width:120px; height:120px; border-radius:50%;
    border:2px solid rgba(200,190,240,.35); background:rgba(30,26,60,.25); pointer-events:none; opacity:0; }
  #joyStick { position:fixed; z-index:21; width:52px; height:52px; border-radius:50%;
    background:rgba(220,210,255,.45); box-shadow:0 0 12px rgba(150,130,255,.4); pointer-events:none; opacity:0; }
  #actBtn { position:fixed; z-index:22; right:26px; bottom:110px; width:72px; height:72px; border-radius:50%;
    border:2px solid rgba(255,220,140,.55); background:rgba(60,48,20,.55); color:#ffe9b0; font-size:14px;
    letter-spacing:.05em; font-family:inherit; display:none; }
  body.touch #actBtn.visible { display:block; }
  #jumpBtn { position:fixed; z-index:22; right:36px; bottom:30px; width:60px; height:60px; border-radius:50%;
    border:2px solid rgba(180,170,230,.45); background:rgba(30,26,60,.5); color:#d8d0f0; font-size:13px;
    font-family:inherit; }

  /* ---- ホラー演出 ---- */
  #dangerVignette { position:fixed; inset:0; z-index:30; pointer-events:none; opacity:0;
    transition:opacity .6s; box-shadow:inset 0 0 120px 60px rgba(160,10,10,.5); }
  #dangerVignette.on { opacity:1; animation:vpulse 1.05s ease-in-out infinite; }
  @keyframes vpulse {
    0%,100% { box-shadow:inset 0 0 120px 60px rgba(160,10,10,.42); }
    50%     { box-shadow:inset 0 0 160px 95px rgba(200,20,20,.68); }
  }
  #gameOverOverlay, #clearOverlay { position:fixed; inset:0; z-index:60; display:none; flex-direction:column;
    align-items:center; justify-content:center; gap:26px; text-align:center; padding:20px; }
  #gameOverOverlay { background:radial-gradient(ellipse at 50% 45%, #2a060a 0%, #12030a 60%, #050208 100%); color:#ffd8d0; }
  #clearOverlay { background:radial-gradient(ellipse at 50% 40%, #1c2a4e 0%, #0a1226 60%, #04060f 100%); color:#e8f0ff; }
  .bigTitle { font-size:clamp(28px,6vw,52px); letter-spacing:.2em; font-weight:700;
    text-shadow:0 0 26px rgba(255,120,80,.5); }
  #clearOverlay .bigTitle { text-shadow:0 0 26px rgba(140,190,255,.6); }
  #clearInfo { font-size:16px; color:#b9c8e8; letter-spacing:.08em; line-height:2; }
  .retryBtn { padding:14px 46px; font-size:17px; letter-spacing:.12em; cursor:pointer; color:#fff0d8;
    background:linear-gradient(180deg,#5a3a2a,#38201a); border:1px solid #c08a5a; border-radius:10px;
    font-family:inherit; min-height:44px; }
  #clearOverlay .retryBtn { background:linear-gradient(180deg,#2a3a6a,#1a2245); border-color:#7a9ad8; }
</style>
</head>
<body>
<div id="app"></div>

<div id="hud">
  <div id="crosshair"></div>
  <div id="roomName"></div>
  <div id="secretCount">除霊 0 / 3</div>
  <div id="prompt"></div>
  <div id="toast"></div>
  <div id="controlsHint">WASD / 矢印キー: 移動　マウス: 視点　Shift: 走る<br>Space: ジャンプ　E / クリック: 杖をふる・調べる　Esc: ポーズ</div>
  <button id="audioBtn" title="音の切り替え">🔊</button>
</div>

<div class="touchUI">
  <div id="joyBase"></div><div id="joyStick"></div>
  <button id="actBtn">調べる</button>
  <button id="jumpBtn">跳ぶ</button>
</div>

<div id="pauseOverlay">クリックして探索を再開</div>

<div id="dangerVignette"></div>
<div id="gameOverOverlay">
  <div class="bigTitle">つかまってしまった……</div>
  <button class="retryBtn" onclick="location.reload()">もういちど挑戦する</button>
</div>
<div id="clearOverlay">
  <div class="bigTitle">脱 出 成 功 ！</div>
  <div id="clearInfo"></div>
  <button class="retryBtn" onclick="location.reload()">もういちど遊ぶ</button>
</div>

<div id="startOverlay">
  <h1>夜霧の魔法城</h1>
  <div class="sub">— 除霊しながら、西のはての扉まで逃げのびろ —</div>
  <div class="help">
    廊下をふさぐ<b>お化け</b>は、近づいて<b>杖で除霊</b>できる。<br>
    <b>青い鬼</b>は除霊できない。見つかったら<b>走って逃げろ</b>。<br>
    しばらく逃げきれば、鬼はあきらめて闇へ帰っていく。
  </div>
  <button id="startBtn">城 に 入 る</button>
  <div id="loadingMsg">読み込み中…</div>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

/* =========================================================
   基盤: レンダラー / シーン / カメラ
========================================================= */
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x06060f);
scene.fog = new THREE.FogExp2(0x08080f, 0.030);

const camera = new THREE.PerspectiveCamera(72, window.innerWidth/window.innerHeight, 0.1, 300);
camera.rotation.order = 'YXZ';

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

const ambient = new THREE.AmbientLight(0x262640, 0.16);
scene.add(ambient);
const moonLight = new THREE.DirectionalLight(0x8fa8ff, 0.18);
moonLight.position.set(40, 60, -50);
scene.add(moonLight);

// プレイヤーのランプ(影なし・軽量) — 毎フレーム視点の少し前に追従させる
const lamp = new THREE.PointLight(0xffbe78, 15, 11, 1.7);
scene.add(lamp);

/* =========================================================
   プロシージャルテクスチャ
========================================================= */
function canvasTex(size, draw) {
  const c = document.createElement('canvas'); c.width = c.height = size;
  draw(c.getContext('2d'), size);
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
function noiseOver(g, s, n, alpha) {
  for (let i=0;i<n;i++) {
    const v = Math.floor(Math.random()*70);
    g.fillStyle = `rgba(${v},${v},${v},${alpha})`;
    g.fillRect(Math.random()*s, Math.random()*s, 2+Math.random()*4, 2+Math.random()*4);
  }
}
function drawStone(g, s) {
  g.fillStyle = '#585866'; g.fillRect(0,0,s,s);
  const rows = 6, bh = s/rows;
  for (let r=0;r<rows;r++) {
    const off = (r%2)*(s/6);
    for (let cx=-1;cx<4;cx++) {
      const x = cx*(s/3)+off, y = r*bh;
      const tone = 78 + Math.floor(Math.random()*26);
      g.fillStyle = `rgb(${tone},${tone},${tone+10})`;
      g.fillRect(x+3, y+3, s/3-6, bh-6);
    }
  }
  g.strokeStyle = 'rgba(20,20,30,.6)'; g.lineWidth = 3;
  for (let r=0;r<=rows;r++) { g.beginPath(); g.moveTo(0,r*bh); g.lineTo(s,r*bh); g.stroke(); }
  noiseOver(g, s, 500, .08);
}
function drawFloorStone(g, s) {
  g.fillStyle = '#4a4a56'; g.fillRect(0,0,s,s);
  const n = 4, t = s/n;
  for (let i=0;i<n;i++) for (let j=0;j<n;j++) {
    const tone = 66 + Math.floor(Math.random()*22);
    g.fillStyle = `rgb(${tone},${tone},${tone+8})`;
    g.fillRect(i*t+2, j*t+2, t-4, t-4);
  }
  noiseOver(g, s, 600, .07);
}
function drawWood(g, s) {
  g.fillStyle = '#5a3d24'; g.fillRect(0,0,s,s);
  for (let i=0;i<24;i++) {
    g.strokeStyle = `rgba(${30+Math.random()*40},${18+Math.random()*22},8,.5)`;
    g.lineWidth = 1+Math.random()*3;
    g.beginPath(); g.moveTo(0, Math.random()*s);
    g.bezierCurveTo(s*.3, Math.random()*s, s*.6, Math.random()*s, s, Math.random()*s);
    g.stroke();
  }
  for (let p=1;p<4;p++) { g.strokeStyle='rgba(15,8,4,.7)'; g.lineWidth=2;
    g.beginPath(); g.moveTo(0,p*s/4); g.lineTo(s,p*s/4); g.stroke(); }
}
function drawBooks(g, s) {
  g.fillStyle = '#2c1c10'; g.fillRect(0,0,s,s);
  const shelves = 4, sh = s/shelves;
  const palette = ['#7a2e2e','#2e4a7a','#3d6b3a','#7a5a2e','#5a2e6b','#8a7440','#40606a','#6b3a3a'];
  for (let r=0;r<shelves;r++) {
    let x = 4;
    while (x < s-8) {
      const w = 8+Math.random()*14, h = sh*0.72 + Math.random()*sh*0.16;
      g.fillStyle = palette[Math.floor(Math.random()*palette.length)];
      g.fillRect(x, (r+1)*sh - h - 4, w, h);
      g.fillStyle = 'rgba(255,230,160,.25)';
      g.fillRect(x+2, (r+1)*sh - h + 4, w-4, 2);
      x += w + 2;
    }
    g.fillStyle = '#1a0f08'; g.fillRect(0, (r+1)*sh-4, s, 4);
  }
}
function drawTapestry(g, s, base, accent) {
  g.fillStyle = base; g.fillRect(0,0,s,s);
  g.strokeStyle = accent; g.lineWidth = 6;
  g.strokeRect(14,14,s-28,s-28);
  g.beginPath(); g.arc(s/2, s/2, s*0.2, 0, Math.PI*2); g.stroke();
  g.beginPath();
  for (let i=0;i<8;i++) {
    const a = i/8*Math.PI*2;
    g.moveTo(s/2, s/2);
    g.lineTo(s/2+Math.cos(a)*s*0.3, s/2+Math.sin(a)*s*0.3);
  }
  g.lineWidth = 3; g.stroke();
  g.fillStyle = accent;
  g.beginPath(); g.arc(s/2, s/2, s*0.06, 0, Math.PI*2); g.fill();
  noiseOver(g, s, 300, .06);
}
function drawGrass(g, s) {
  g.fillStyle = '#24331e'; g.fillRect(0,0,s,s);
  for (let i=0;i<900;i++) {
    const v = 40+Math.random()*40;
    g.fillStyle = `rgba(${v*0.6},${v},${v*0.45},.5)`;
    g.fillRect(Math.random()*s, Math.random()*s, 2, 3+Math.random()*4);
  }
}
function drawFlame(g, s) {
  const grad = g.createRadialGradient(s/2, s*0.62, 2, s/2, s*0.55, s*0.42);
  grad.addColorStop(0, 'rgba(255,255,230,1)');
  grad.addColorStop(0.3, 'rgba(255,210,110,.95)');
  grad.addColorStop(0.7, 'rgba(255,120,30,.55)');
  grad.addColorStop(1, 'rgba(255,60,0,0)');
  g.fillStyle = grad; g.fillRect(0,0,s,s);
}
function drawGlow(g, s, color) {
  const grad = g.createRadialGradient(s/2,s/2,1,s/2,s/2,s/2);
  grad.addColorStop(0, color);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  g.fillStyle = grad; g.fillRect(0,0,s,s);
}
function drawPortrait(g, s) {
  const hues = [[80,60,120],[120,70,50],[50,90,110],[100,90,60]];
  const [r,gr,b] = hues[Math.floor(Math.random()*hues.length)];
  const grad = g.createLinearGradient(0,0,0,s);
  grad.addColorStop(0, `rgb(${r+40},${gr+40},${b+50})`);
  grad.addColorStop(1, `rgb(${r-30},${gr-30},${b-20})`);
  g.fillStyle = grad; g.fillRect(0,0,s,s);
  g.fillStyle = 'rgba(30,20,18,.85)';
  g.beginPath(); g.ellipse(s/2, s*0.72, s*0.26, s*0.3, 0, 0, Math.PI*2); g.fill();
  g.beginPath(); g.arc(s/2, s*0.4, s*0.15, 0, Math.PI*2); g.fill();
  g.fillStyle = 'rgba(255,240,210,.16)';
  g.beginPath(); g.arc(s/2, s*0.4, s*0.13, 0, Math.PI*2); g.fill();
  noiseOver(g, s, 250, .1);
}
function drawWindow(g, s) {
  const grad = g.createLinearGradient(0,0,0,s);
  grad.addColorStop(0, '#1c2a5e'); grad.addColorStop(0.5, '#2c3f80'); grad.addColorStop(1, '#141d40');
  g.fillStyle = grad; g.fillRect(0,0,s,s);
  g.fillStyle = 'rgba(240,246,255,.9)';
  g.beginPath(); g.arc(s*0.68, s*0.24, s*0.09, 0, Math.PI*2); g.fill();
  g.fillStyle = 'rgba(255,255,255,.7)';
  for (let i=0;i<26;i++) g.fillRect(Math.random()*s, Math.random()*s, 2, 2);
  g.strokeStyle = '#0a0a14'; g.lineWidth = 8;
  g.strokeRect(4,4,s-8,s-8);
  g.beginPath(); g.moveTo(s/2,0); g.lineTo(s/2,s); g.moveTo(0,s/2); g.lineTo(s,s/2); g.stroke();
}

const TEX = {
  flame: canvasTex(128, drawFlame),
  glowWarm: canvasTex(128, (g,s)=>drawGlow(g,s,'rgba(255,215,130,.9)')),
  glowGreen: canvasTex(128, (g,s)=>drawGlow(g,s,'rgba(120,255,150,.9)')),
  glowPurple: canvasTex(128, (g,s)=>drawGlow(g,s,'rgba(200,140,255,.9)')),
  glowBlue: canvasTex(128, (g,s)=>drawGlow(g,s,'rgba(140,180,255,.9)')),
  window: canvasTex(256, drawWindow),
};

const baseStone = canvasTex(256, drawStone);
const baseFloor = canvasTex(256, drawFloorStone);
const baseWood  = canvasTex(256, drawWood);
const baseGrass = canvasTex(256, drawGrass);
const baseBooks = canvasTex(256, drawBooks);

function repTex(base, rx, ry) {
  const t = base.clone();
  t.needsUpdate = true;
  t.repeat.set(rx, ry);
  return t;
}
function stoneMat(w, h, tint) {
  return new THREE.MeshLambertMaterial({ map:repTex(baseStone, Math.max(1,w/4), Math.max(1,h/4)), color: tint || 0xffffff });
}
function woodMat(w, h) {
  return new THREE.MeshLambertMaterial({ map:repTex(baseWood, Math.max(1,w/2), Math.max(1,h/2)) });
}

/* =========================================================
   当たり判定 / 壁ビルダー
========================================================= */
const colliders = [];   // {minX,maxX,minZ,maxZ,id}
function addCollider(minX, maxX, minZ, maxZ, id) {
  colliders.push({ minX, maxX, minZ, maxZ, id: id||null });
}
function removeColliderById(id) {
  for (let i=colliders.length-1;i>=0;i--) if (colliders[i].id === id) colliders.splice(i,1);
}

const WALL_T = 0.45;
const wallGroup = new THREE.Group(); scene.add(wallGroup);

// 1次元の壁をドア穴で実体セグメントに分割する
// doors: [{at, w, h}]  戻り値: [{from,to,y0,h}]
function wallSegments(a, b, height, doors) {
  const list = [];
  const ds = [...doors].sort((p,q)=>p.at-q.at);
  let cur = a;
  for (const d of ds) {
    const dw = d.w ?? 2.2, dh = d.h ?? 3.0;
    const s = Math.max(a, d.at - dw/2), e = Math.min(b, d.at + dw/2);
    if (s > cur + 0.01) list.push({ from:cur, to:s, y0:0, h:height });
    if (height > dh + 0.05) list.push({ from:s, to:e, y0:dh, h:height-dh }); // まぐさ(上部)
    cur = e;
  }
  if (cur < b - 0.01) list.push({ from:cur, to:b, y0:0, h:height });
  return list;
}
// x方向に伸びる壁 (z固定)
function buildWallX(z, x1, x2, height, doors=[], tint) {
  for (const sg of wallSegments(x1, x2, height, doors)) {
    const len = sg.to - sg.from;
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(len, sg.h, WALL_T), stoneMat(len, sg.h, tint));
    mesh.position.set((sg.from+sg.to)/2, sg.y0 + sg.h/2, z);
    wallGroup.add(mesh);
    if (sg.y0 < 1.8) addCollider(sg.from, sg.to, z-WALL_T/2, z+WALL_T/2);
  }
}
// z方向に伸びる壁 (x固定)
function buildWallZ(x, z1, z2, height, doors=[], tint) {
  for (const sg of wallSegments(z1, z2, height, doors)) {
    const len = sg.to - sg.from;
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(WALL_T, sg.h, len), stoneMat(len, sg.h, tint));
    mesh.position.set(x, sg.y0 + sg.h/2, (sg.from+sg.to)/2);
    wallGroup.add(mesh);
    if (sg.y0 < 1.8) addCollider(x-WALL_T/2, x+WALL_T/2, sg.from, sg.to);
  }
}

/* =========================================================
   床・天井 / 部屋レイアウト
========================================================= */
function addFloor(x1, x2, z1, z2, base, tint, texScale=4) {
  const w = x2-x1, d = z2-z1;
  const mat = new THREE.MeshLambertMaterial({ map:repTex(base, w/texScale, d/texScale), color:tint||0xffffff });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, d), mat);
  mesh.rotation.x = -Math.PI/2;
  mesh.position.set((x1+x2)/2, 0.01, (z1+z2)/2);
  scene.add(mesh);
  return mesh;
}
function addCeiling(x1, x2, z1, z2, y, tint) {
  const w = x2-x1, d = z2-z1;
  const mat = new THREE.MeshLambertMaterial({ map:repTex(baseStone, w/5, d/5), color:tint||0x8a8a96 });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, d), mat);
  mesh.rotation.x = Math.PI/2;
  mesh.position.set((x1+x2)/2, y, (z1+z2)/2);
  scene.add(mesh);
}

function makeFlame(x, y, z, scale=0.5) {
  const mat = new THREE.SpriteMaterial({ map:TEX.flame, blending:THREE.AdditiveBlending, depthWrite:false, transparent:true });
  const s = new THREE.Sprite(mat);
  s.position.set(x, y, z);
  s.scale.set(scale, scale*1.4, 1);
  decoGroup.add(s);
  flames.push({ sprite:s, base:scale, speed:6+Math.random()*5, phase:Math.random()*10 });
  return s;
}
function makeGlow(x, y, z, tex, scale=1.6, opacity=0.5) {
  const mat = new THREE.SpriteMaterial({ map:tex, blending:THREE.AdditiveBlending, depthWrite:false, transparent:true, opacity });
  const s = new THREE.Sprite(mat);
  s.position.set(x, y, z); s.scale.set(scale, scale, 1);
  decoGroup.add(s);
  return s;
}
function makeFlickerLight(x, y, z, color, intensity, dist, amp=0.25) {
  const l = new THREE.PointLight(color, intensity, dist, 1.6);
  l.position.set(x, y, z);
  scene.add(l);
  flickers.push({ light:l, base:intensity, amp, speed:7+Math.random()*6, phase:Math.random()*10 });
  return l;
}
// 松明(壁掛け): dir は炎が向く外向き ('n','s','e','w' = 壁が向く方向)
function makeTorch(x, y, z) {
  const stick = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.07, 0.7, 6),
    new THREE.MeshLambertMaterial({ color:0x3a2a18 }));
  stick.position.set(x, y-0.2, z);
  stick.rotation.z = 0.0;
  decoGroup.add(stick);
  const cup = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.07, 0.16, 8),
    new THREE.MeshLambertMaterial({ color:0x55452a }));
  cup.position.set(x, y+0.14, z);
  decoGroup.add(cup);
  makeFlame(x, y+0.42, z, 0.55);
  makeGlow(x, y+0.42, z, TEX.glowWarm, 2.0, 0.4);
}
function makeTable(x, z, w, d, h=0.85, ry=0) {
  const g = new THREE.Group();
  const top = new THREE.Mesh(new THREE.BoxGeometry(w, 0.09, d), woodMat(w, d));
  top.position.y = h;
  g.add(top);
  const legGeo = new THREE.BoxGeometry(0.1, h, 0.1);
  const legMat = new THREE.MeshLambertMaterial({ color:0x3c2a16 });
  for (const [sx, sz] of [[1,1],[1,-1],[-1,1],[-1,-1]]) {
    const leg = new THREE.Mesh(legGeo, legMat);
    leg.position.set(sx*(w/2-0.12), h/2, sz*(d/2-0.12));
    g.add(leg);
  }
  g.position.set(x, 0, z); g.rotation.y = ry;
  decoGroup.add(g);
  // ざっくりコライダー(回転は90度単位のみ想定)
  const rot = Math.abs(Math.sin(ry)) > 0.5;
  const cw = rot ? d : w, cd = rot ? w : d;
  addCollider(x-cw/2, x+cw/2, z-cd/2, z+cd/2);
  return g;
}
function makeBench(x, z, w, ry=0) {
  const g = new THREE.Group();
  const seat = new THREE.Mesh(new THREE.BoxGeometry(w, 0.07, 0.34), woodMat(w, 0.4));
  seat.position.y = 0.46; g.add(seat);
  const legMat = new THREE.MeshLambertMaterial({ color:0x33230f });
  for (const s of [-1,1]) {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.46, 0.3), legMat);
    leg.position.set(s*(w/2-0.15), 0.23, 0); g.add(leg);
  }
  g.position.set(x, 0, z); g.rotation.y = ry;
  decoGroup.add(g);
  const rot = Math.abs(Math.sin(ry)) > 0.5;
  const cw = rot ? 0.34 : w, cd = rot ? w : 0.34;
  addCollider(x-cw/2, x+cw/2, z-cd/2, z+cd/2);
  return g;
}
function makeCandle(x, y, z, scale=1) {
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.045*scale, 0.05*scale, 0.3*scale, 8),
    new THREE.MeshLambertMaterial({ color:0xe8dfc0, emissive:0x332c14 }));
  body.position.set(x, y, z);
  decoGroup.add(body);
  makeFlame(x, y + 0.24*scale, z, 0.22*scale);
  return body;
}
function makeBookshelf(x, z, w, h, ry=0, withCollider=true) {
  const g = new THREE.Group();
  const frame = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.5),
    new THREE.MeshLambertMaterial({ color:0x2a1a0e }));
  frame.position.y = h/2; g.add(frame);
  const face = new THREE.Mesh(new THREE.PlaneGeometry(w-0.12, h-0.12),
    new THREE.MeshLambertMaterial({ map:repTex(baseBooks, Math.max(1, w/2.2), Math.max(1, h/2.4)) }));
  face.position.set(0, h/2, 0.26); g.add(face);
  g.position.set(x, 0, z); g.rotation.y = ry;
  decoGroup.add(g);
  if (withCollider) {
    const rot = Math.abs(Math.sin(ry)) > 0.5;
    const cw = rot ? 0.5 : w, cd = rot ? w : 0.5;
    addCollider(x-cw/2, x+cw/2, z-cd/2, z+cd/2);
  }
  return g;
}
function makePortrait(x, y, z, ry, w=1.2, h=1.6) {
  const g = new THREE.Group();
  const frame = new THREE.Mesh(new THREE.BoxGeometry(w+0.16, h+0.16, 0.08),
    new THREE.MeshLambertMaterial({ color:0x6a5220, emissive:0x201804 }));
  g.add(frame);
  const pic = new THREE.Mesh(new THREE.PlaneGeometry(w, h),
    new THREE.MeshLambertMaterial({ map:canvasTex(128, drawPortrait) }));
  pic.position.z = 0.05; g.add(pic);
  g.position.set(x, y, z); g.rotation.y = ry;
  decoGroup.add(g);
  return g;
}
function makeWindowPane(x, y, z, ry, w=1.6, h=2.6) {
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h),
    new THREE.MeshBasicMaterial({ map:TEX.window.clone() }));
  mesh.material.map.needsUpdate = true;
  mesh.position.set(x, y, z); mesh.rotation.y = ry;
  decoGroup.add(mesh);
  return mesh;
}
function makeArmor(x, z, ry) {
  const g = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color:0x9aa2b2, metalness:0.85, roughness:0.35 });
  const base = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.25, 0.8),
    new THREE.MeshLambertMaterial({ color:0x444450 }));
  base.position.y = 0.125; g.add(base);
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.24, 0.3, 0.85, 8), mat);
  body.position.y = 1.0; g.add(body);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.19, 10, 8), mat);
  head.position.y = 1.62; g.add(head);
  const plume = new THREE.Mesh(new THREE.ConeGeometry(0.06, 0.3, 6),
    new THREE.MeshLambertMaterial({ color:0x8a2030 }));
  plume.position.y = 1.9; g.add(plume);
  for (const s of [-1,1]) {
    const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.7, 6), mat);
    arm.position.set(s*0.36, 1.05, 0); arm.rotation.z = s*0.15; g.add(arm);
  }
  const spear = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 2.4, 6),
    new THREE.MeshLambertMaterial({ color:0x4a3620 }));
  spear.position.set(0.42, 1.25, 0); g.add(spear);
  const tip = new THREE.Mesh(new THREE.ConeGeometry(0.07, 0.24, 6), mat);
  tip.position.set(0.42, 2.55, 0); g.add(tip);
  g.position.set(x, 0, z); g.rotation.y = ry;
  decoGroup.add(g);
  addCollider(x-0.45, x+0.45, z-0.45, z+0.45);
  return g;
}

function updateHorror(dt) {
  // お化けのゆらゆら
  for (const gh of ghosts) {
    if (gh.done) continue;
    gh.g.position.y = 0.12 + Math.sin(elapsed*1.3 + gh.phase) * 0.18;
    gh.g.rotation.y = Math.sin(elapsed*0.7 + gh.phase) * 0.4;
    gh.glowMat.opacity = 0.4 + Math.sin(elapsed*2 + gh.phase) * 0.1;
  }
  // 青鬼: 3体除霊後、西の廊下に入ったら1回だけ出現(少し間を置いて)
  if (oni.state === 'none' && exorcised >= 3 &&
      player.pos.x < -24 && Math.abs(player.pos.z) < 3) {
    oni.state = 'pending'; oni.t = 0;
  }
  if (oni.state === 'pending') {
    oni.t += dt;
    if (oni.t > 2.5) spawnOni();
  }
  if (oni.state === 'lurk' || oni.state === 'chase') {
    const op = oni.grp.position;
    const dx = player.pos.x - op.x, dz = player.pos.z - op.z;
    const dist = Math.max(Math.hypot(dx, dz), 0.001);
    oni.grp.rotation.y = Math.atan2(-dz, dx);   // 正面(+x)をプレイヤーへ

    if (oni.state === 'lurk') {
      oni.t += dt;
      // 少し後ろ(東側)をゆっくりついてくる
      const targetX = player.pos.x + 9;
      op.x += Math.sign(targetX - op.x) * Math.min(Math.abs(targetX - op.x), 2.0*dt);
      op.z += (0 - op.z) * dt;
      if (!oni.hinted && oni.t > 4) {
        oni.hinted = true;
        showToast('気配がすぐそこに……ふりむく？ それとも走る？');
      }
      // 振り向いてランプで照らした(視界に入れた)瞬間から追跡
      const fwdx = -Math.sin(player.yaw), fwdz = -Math.cos(player.yaw);
      const look = (fwdx*(op.x - player.pos.x) + fwdz*(op.z - player.pos.z)) / dist;
      if ((look > 0.55 && dist < 26) || dist < 3.2) startChase();
    } else {
      // 追跡: プレイヤーの走り(7.5)より少し遅い
      oni.chaseT += dt;
      const sp = 5.6;
      op.x += dx/dist * sp * dt;
      op.z += dz/dist * sp * dt;
      // 廊下から出ない(部屋・アルコーブには入れない)
      op.x = Math.max(-41, Math.min(41, op.x));
      op.z = Math.max(-2.2, Math.min(2.2, op.z));
      oni.grp.position.y = Math.abs(Math.sin(elapsed*10)) * 0.14;
      oni.hb -= dt;
      if (oni.hb <= 0) { playThump(); oni.hb = 0.5; }
      if (dist < 1.15) { doGameOver(); return; }
      // ほどほどに逃げきったら諦める
      if (dist > 17 || oni.chaseT > 11) startFlee();
    }
  } else if (oni.state === 'flee') {
    oni.t += dt;
    oni.grp.position.x += 7 * dt;
    oni.grp.rotation.y = 0;   // 東(来た方向)へ帰る
    for (const m of oni.mats) m.opacity = Math.max(0, m.opacity - dt*0.5);
    oni.glowMat.opacity = Math.max(0, oni.glowMat.opacity - dt*0.4);
    if (oni.t > 2.6) {
      scene.remove(oni.grp);
      oni.state = 'gone';
      showToast('……青鬼はあきらめて、闇の奥へ消えていった');
    }
  }
}

document.addEventListener('gesturestart', e => e.preventDefault(), { passive:false });
document.addEventListener('gesturechange', e => e.preventDefault(), { passive:false });
let __lastTouchEnd = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - __lastTouchEnd < 350) e.preventDefault();   // 素早い連続タップの拡大を防ぐ
  __lastTouchEnd = now;
}, { passive:false });

// ポインタロック
const pauseOverlay = document.getElementById('pauseOverlay');
function lockPointer() {
  if (!isTouch) renderer.domElement.requestPointerLock();
}
renderer.domElement.addEventListener('click', () => {
  if (!started || isTouch) return;
  if (document.pointerLockElement !== renderer.domElement) lockPointer();
  else doInteract();
});
pauseOverlay.addEventListener('click', () => { pauseOverlay.style.display = 'none'; lockPointer(); });
document.addEventListener('pointerlockchange', () => {
  if (!started || isTouch || gameEnded) return;
  const locked = document.pointerLockElement === renderer.domElement;
  paused = !locked;
  pauseOverlay.style.display = locked ? 'none' : 'flex';
});
document.addEventListener('mousemove', e => {
  if (document.pointerLockElement !== renderer.domElement) return;
  player.yaw   -= e.movementX * 0.0022;
  player.pitch -= e.movementY * 0.0022;
  player.pitch = Math.max(-1.45, Math.min(1.45, player.pitch));
});

/* ---- タッチ操作 ---- */
const joy = { active:false, id:null, ox:0, oy:0, dx:0, dy:0 };
const look = { active:false, id:null, lx:0, ly:0 };
const joyBase = document.getElementById('joyBase');
const joyStick = document.getElementById('joyStick');

function setupTouch() {
  document.body.classList.add('touch');
  window.addEventListener('touchstart', e => {
    if (!started) return;
    for (const t of e.changedTouches) {
      if (t.target.closest('button')) continue;
      if (t.clientX < window.innerWidth/2 && !joy.active) {
        joy.active = true; joy.id = t.identifier;
        joy.ox = t.clientX; joy.oy = t.clientY; joy.dx = joy.dy = 0;
        joyBase.style.left = (joy.ox-60)+'px'; joyBase.style.top = (joy.oy-60)+'px';
        joyStick.style.left = (joy.ox-26)+'px'; joyStick.style.top = (joy.oy-26)+'px';
        joyBase.style.opacity = joyStick.style.opacity = 1;
      } else if (!look.active) {
        look.active = true; look.id = t.identifier;
        look.lx = t.clientX; look.ly = t.clientY;
      }
    }
  }, { passive:false });
  window.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (joy.active && t.identifier === joy.id) {
        let dx = t.clientX - joy.ox, dy = t.clientY - joy.oy;
        const len = Math.hypot(dx, dy), max = 55;
        if (len > max) { dx = dx/len*max; dy = dy/len*max; }
        joy.dx = dx/max; joy.dy = dy/max;
        joyStick.style.left = (joy.ox+dx-26)+'px'; joyStick.style.top = (joy.oy+dy-26)+'px';
      }
      if (look.active && t.identifier === look.id) {
        player.yaw   -= (t.clientX - look.lx) * 0.0042;
        player.pitch -= (t.clientY - look.ly) * 0.0042;
        player.pitch = Math.max(-1.45, Math.min(1.45, player.pitch));
        look.lx = t.clientX; look.ly = t.clientY;
      }
    }
  }, { passive:false });
  const endTouch = e => {
    for (const t of e.changedTouches) {
      if (joy.active && t.identifier === joy.id) {
        joy.active = false; joy.dx = joy.dy = 0;
        joyBase.style.opacity = joyStick.style.opacity = 0;
      }
      if (look.active && t.identifier === look.id) look.active = false;
    }
  };
  window.addEventListener('touchend', endTouch);
  window.addEventListener('touchcancel', endTouch);
  actBtn.addEventListener('touchstart', e => { e.preventDefault(); doInteract(); });
  document.getElementById('jumpBtn').addEventListener('touchstart', e => {
    e.preventDefault();
    if (player.grounded) { player.vy = 5.2; player.grounded = false; }
  });
}
if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
  isTouch = true; setupTouch();
  document.querySelector('#startOverlay .help').innerHTML =
    '廊下をふさぐ<b>お化け</b>は、近づいて<b>「調べる」で除霊</b>。<br>' +
    '<b>青い鬼</b>は除霊できない。見つかったら<b>走って逃げろ</b>。<br>' +
    '<b>左半分</b>をなぞって移動、<b>右半分</b>をなぞって視点。';
}

/* ---- 衝突解決 (円 vs AABB) ---- */
function resolveCollisions(pos, r) {
  for (const c of colliders) {
    const nx = Math.max(c.minX, Math.min(pos.x, c.maxX));
    const nz = Math.max(c.minZ, Math.min(pos.z, c.maxZ));
    let dx = pos.x - nx, dz = pos.z - nz;
    const d2 = dx*dx + dz*dz;
    if (d2 >= r*r) continue;
    if (d2 > 1e-8) {
      const d = Math.sqrt(d2), push = r - d;
      pos.x += dx/d*push; pos.z += dz/d*push;
    } else {
      // 中心がAABB内 → 最小貫通軸で押し出す
      const pxMin = pos.x - c.minX + r, pxMax = c.maxX - pos.x + r;
      const pzMin = pos.z - c.minZ + r, pzMax = c.maxZ - pos.z + r;
      const m = Math.min(pxMin, pxMax, pzMin, pzMax);
      if (m === pxMin) pos.x = c.minX - r;
      else if (m === pxMax) pos.x = c.maxX + r;
      else if (m === pzMin) pos.z = c.minZ - r;
      else pos.z = c.maxZ + r;
    }
  }
}

let stepTimer = 0, bobPhase = 0;
function updatePlayer(dt) {
  // 入力 → 移動ベクトル
  let ix = 0, iz = 0;
  if (keys['KeyW'] || keys['ArrowUp']) iz -= 1;
  if (keys['KeyS'] || keys['ArrowDown']) iz += 1;
  if (keys['KeyA'] || keys['ArrowLeft']) ix -= 1;
  if (keys['KeyD'] || keys['ArrowRight']) ix += 1;
  if (joy.active) { ix += joy.dx; iz += joy.dy; }
  const ilen = Math.hypot(ix, iz);
  if (ilen > 1) { ix /= ilen; iz /= ilen; }

  const running = keys['ShiftLeft'] || keys['ShiftRight'];
  const speed = running ? 7.5 : 4.2;

  // カメラ前方 = (-sinθ, -cosθ), 右 = (cosθ, -sinθ)
  const sin = Math.sin(player.yaw), cos = Math.cos(player.yaw);
  const vx = (ix*cos + iz*sin) * speed;
  const vz = (-ix*sin + iz*cos) * speed;

  player.pos.x += vx * dt;
  player.pos.z += vz * dt;

  // ジャンプ / 重力
  if ((keys['Space']) && player.grounded) { player.vy = 5.2; player.grounded = false; }
  player.vy -= 14 * dt;
  player.pos.y += player.vy * dt;
  if (player.pos.y <= 0) { player.pos.y = 0; player.vy = 0; player.grounded = true; }

  resolveCollisions(player.pos, player.radius);

  // 場外セーフティ
  player.pos.x = Math.max(-48.6, Math.min(41.6, player.pos.x));
  player.pos.z = Math.max(-32.6, Math.min(32.6, player.pos.z));

  // 頭の揺れ + 足音
  const moving = ilen > 0.15 && player.grounded;
  if (moving) {
    bobPhase += dt * (running ? 11 : 7.5);
    stepTimer -= dt;
    if (stepTimer <= 0) { playFootstep(); stepTimer = running ? 0.32 : 0.48; }
  } else {
    stepTimer = 0.1;
  }
  const bob = moving ? Math.sin(bobPhase) * 0.045 : 0;

  camera.position.set(player.pos.x, player.pos.y + player.eyeHeight + bob, player.pos.z);
  camera.rotation.set(player.pitch, player.yaw, 0);
}

/* =========================================================
   部屋の検出 / 雰囲気の遷移
========================================================= */
const roomNameEl = document.getElementById('roomName');
let currentRoom = null, roomNameTimer = null;
const targetFog = new THREE.Color(0x0a0a16);
let targetFogD = 0.028, targetAmb = 0.15;
const AMB_SCALE = 0.3;   // ホラー用: 部屋の環境光を一律暗く

function detectRoom() {
  let found = null;
  for (const r of rooms) {
    if (player.pos.x >= r.minX && player.pos.x <= r.maxX &&
        player.pos.z >= r.minZ && player.pos.z <= r.maxZ) { found = r; }
  }
  if (found && found !== currentRoom) {
    currentRoom = found;
    roomNameEl.textContent = found.name;
    roomNameEl.style.opacity = 1;
    clearTimeout(roomNameTimer);
    roomNameTimer = setTimeout(() => roomNameEl.style.opacity = 0, 2600);
    targetFog.setHex(found.fog);
    targetFogD = found.fogD + 0.006;
    targetAmb = found.amb * AMB_SCALE;
  }
}

/* =========================================================
   サウンド (Web Audio・全部プロシージャル)
========================================================= */
let actx = null, master = null, bgmGain = null, windGain = null, windFilter = null;
let audioOn = true;
const audioBtn = document.getElementById('audioBtn');
audioBtn.addEventListener('click', () => {
  audioOn = !audioOn;
  audioBtn.textContent = audioOn ? '🔊' : '🔇';
  if (master) master.gain.linearRampToValueAtTime(audioOn ? 0.9 : 0, actx.currentTime + 0.3);
});

function initAudio() {
  const AC = window.AudioContext || window.webkitAudioContext;
  actx = new AC();
  master = actx.createGain(); master.gain.value = 0.9;
  master.connect(actx.destination);

  // --- BGMパッド ---
  bgmGain = actx.createGain(); bgmGain.gain.value = 0.16;
  const bgmFilter = actx.createBiquadFilter();
  bgmFilter.type = 'lowpass'; bgmFilter.frequency.value = 900;
  bgmGain.connect(bgmFilter); bgmFilter.connect(master);

  // Am - F - C - G (低めで神秘的に)
  const chords = [
    [110.00, 164.81, 220.00, 261.63],
    [ 87.31, 130.81, 174.61, 220.00],
    [ 98.00, 130.81, 196.00, 246.94],
    [ 98.00, 146.83, 196.00, 293.66],
  ];
  let chordIdx = 0;
  function playChord() {
    if (!actx || actx.state === 'closed') return;
    const now = actx.currentTime;
    const dur = 7.5;
    for (const f of chords[chordIdx % chords.length]) {
      for (const det of [-4, 4]) {
        const o = actx.createOscillator();
        o.type = 'triangle';
        o.frequency.value = f;
        o.detune.value = det;
        const g = actx.createGain();
        g.gain.setValueAtTime(0, now);
        g.gain.linearRampToValueAtTime(0.05, now + 2.2);
        g.gain.setValueAtTime(0.05, now + dur - 2.5);
        g.gain.linearRampToValueAtTime(0, now + dur);
        o.connect(g); g.connect(bgmGain);
        o.start(now); o.stop(now + dur + 0.1);
      }
    }
    chordIdx++;
    setTimeout(playChord, (dur - 1.4) * 1000);
  }
  playChord();

  // --- 遠くの鐘(ときどき) ---
  const bellScale = [523.25, 587.33, 659.25, 783.99, 880.00];
  function playBell() {
    if (!actx || actx.state === 'closed') return;
    const now = actx.currentTime;
    const f = bellScale[Math.floor(Math.random()*bellScale.length)];
    const o = actx.createOscillator();
    o.type = 'sine'; o.frequency.value = f;
    const o2 = actx.createOscillator();
    o2.type = 'sine'; o2.frequency.value = f * 2.76;
    const g = actx.createGain();
    g.gain.setValueAtTime(0.06, now);
    g.gain.exponentialRampToValueAtTime(0.0004, now + 4.5);
    const g2 = actx.createGain();
    g2.gain.setValueAtTime(0.015, now);
    g2.gain.exponentialRampToValueAtTime(0.0004, now + 2.2);
    o.connect(g); g.connect(master);
    o2.connect(g2); g2.connect(master);
    o.start(now); o.stop(now + 4.6);
    o2.start(now); o2.stop(now + 2.3);
    setTimeout(playBell, 9000 + Math.random()*16000);
  }
  setTimeout(playBell, 5000);

  // --- 風 (中庭で強くなる) ---
  const noiseBuf = actx.createBuffer(1, actx.sampleRate * 2, actx.sampleRate);
  const nd = noiseBuf.getChannelData(0);
  for (let i=0;i<nd.length;i++) nd[i] = Math.random()*2 - 1;
  const noiseSrc = actx.createBufferSource();
  noiseSrc.buffer = noiseBuf; noiseSrc.loop = true;
  windFilter = actx.createBiquadFilter();
  windFilter.type = 'bandpass'; windFilter.frequency.value = 340; windFilter.Q.value = 0.8;
  windGain = actx.createGain(); windGain.gain.value = 0.015;
  noiseSrc.connect(windFilter); windFilter.connect(windGain); windGain.connect(master);
  noiseSrc.start();

  window.__noiseBuf = noiseBuf;
}

function playFootstep() {
  if (!actx || !audioOn) return;
  const now = actx.currentTime;
  const src = actx.createBufferSource();
  src.buffer = window.__noiseBuf;
  src.playbackRate.value = 0.7 + Math.random()*0.3;
  const f = actx.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = 380 + Math.random()*120;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.11, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.09);
  src.connect(f); f.connect(g); g.connect(master);
  src.start(now, Math.random()*1.5, 0.1);
}
function playSecretSound() {
  if (!actx || !audioOn) return;
  const now = actx.currentTime;
  // 石の擦れる低音
  const src = actx.createBufferSource();
  src.buffer = window.__noiseBuf; src.loop = true;
  src.playbackRate.value = 0.3;
  const f = actx.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = 130;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, now);
  g.gain.linearRampToValueAtTime(0.28, now + 0.25);
  g.gain.linearRampToValueAtTime(0.0001, now + 2.0);
  src.connect(f); f.connect(g); g.connect(master);
  src.start(now); src.stop(now + 2.1);
  // 発見のアルペジオ
  [523.25, 659.25, 783.99, 1046.5].forEach((fr, i) => {
    const o = actx.createOscillator();
    o.type = 'sine'; o.frequency.value = fr;
    const og = actx.createGain();
    const t0 = now + 0.5 + i*0.16;
    og.gain.setValueAtTime(0.09, t0);
    og.gain.exponentialRampToValueAtTime(0.0006, t0 + 1.4);
    o.connect(og); og.connect(master);
    o.start(t0); o.stop(t0 + 1.5);
  });
}

/* ---- ホラー用効果音 ---- */
let growlNodes = null;
function startGrowl() {
  if (!actx || growlNodes) return;
  const o = actx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = 46;
  const f = actx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 160;
  const g = actx.createGain(); g.gain.value = 0.0001;
  g.gain.linearRampToValueAtTime(audioOn ? 0.09 : 0.0001, actx.currentTime + 1.5);
  const lfo = actx.createOscillator(); lfo.frequency.value = 2.3;
  const lg = actx.createGain(); lg.gain.value = 0.035;
  lfo.connect(lg); lg.connect(g.gain);
  o.connect(f); f.connect(g); g.connect(master);
  o.start(); lfo.start();
  growlNodes = { o, lfo, g };
}
function stopGrowl() {
  if (!growlNodes || !actx) return;
  const { o, lfo, g } = growlNodes;
  g.gain.linearRampToValueAtTime(0.0001, actx.currentTime + 0.8);
  o.stop(actx.currentTime + 1); lfo.stop(actx.currentTime + 1);
  growlNodes = null;
}
function playRoar() {
  if (!actx || !audioOn) return;
  const now = actx.currentTime;
  const o = actx.createOscillator(); o.type = 'sawtooth';
  o.frequency.setValueAtTime(240, now);
  o.frequency.exponentialRampToValueAtTime(55, now + 0.9);
  const f = actx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 700;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.34, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 1.1);
  o.connect(f); f.connect(g); g.connect(master);
  o.start(now); o.stop(now + 1.2);
}
function playThump() {
  if (!actx || !audioOn) return;
  const now = actx.currentTime;
  const o = actx.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(58, now);
  o.frequency.exponentialRampToValueAtTime(34, now + 0.16);
  const g = actx.createGain();

  g.gain.exponentialRampToValueAtTime(0.001, now + 0.18);

function playExorcism() {
  if (!actx || !audioOn) return;
  const now = actx.currentTime;

  const f = actx.createBiquadFilter(); f.type = 'bandpass';

    o.connect(og); og.connect(master);

function playCaught() {

/* =========================================================
   メインループ
========================================================= */
const clock = new THREE.Clock();
let elapsed = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);   // 120Hz対応: delta-time正規化
  if (!started) { renderer.render(scene, camera); return; }
  if (paused || gameEnded) return;
  elapsed += dt;

  updatePlayer(dt);
  // ランプを視点の少し前に追従(ゆらぎ付き)
  lamp.position.set(
    camera.position.x - Math.sin(player.yaw)*0.5,
    camera.position.y - 0.15,
    camera.position.z - Math.cos(player.yaw)*0.5
  );
  lamp.intensity = 15 + Math.sin(elapsed*9)*1.1 + Math.sin(elapsed*23)*0.6;
  detectRoom();
  updateInteractables();
  updateHorror(dt);

  // 雰囲気の遷移
  scene.fog.color.lerp(targetFog, dt*1.5);
  scene.fog.density += (targetFogD - scene.fog.density) * dt * 1.5;
  ambient.intensity += (targetAmb - ambient.intensity) * dt * 1.5;

  // 炎のゆらぎ
  for (const f of flames) {
    const s = f.base * (1 + Math.sin(elapsed*f.speed + f.phase)*0.14 + Math.sin(elapsed*f.speed*2.3)*0.07);
    f.sprite.scale.set(s, s*1.4, 1);
  }
  for (const fl of flickers) {
    fl.light.intensity = fl.base * (1 + Math.sin(elapsed*fl.speed + fl.phase)*fl.amp
      + Math.sin(elapsed*fl.speed*2.7 + fl.phase)*fl.amp*0.5);
  }
  // 浮遊 / 回転
  for (const b of bobbers) b.obj.position.y = b.baseY + Math.sin(elapsed*b.speed + b.phase)*b.amp;
  for (const s of spinners) s.obj.rotation.y += s.speed*dt;

  // 大鍋の泡
  if (window.__bubbles) {
    const bb = window.__bubbles, arr = bb.points.geometry.attributes.position.array;
    for (let i=0;i<bb.n;i++) {
      arr[i*3+1] += bb.data[i].speed * dt;
      if (arr[i*3+1] > 2.6) {
        arr[i*3+1] = 1.3;
        const a = Math.random()*Math.PI*2, r = Math.random()*0.6;
        arr[i*3] = -33 + Math.cos(a)*r;
        arr[i*3+2] = 15 + Math.sin(a)*r;
      }
    }
    bb.points.geometry.attributes.position.needsUpdate = true;
  }
  // 呪文学のきらめき
  if (window.__sparkles) {
    const sp = window.__sparkles, arr = sp.points.geometry.attributes.position.array;
    for (let i=0;i<sp.n;i++) {
      arr[i*3+1] += sp.data[i].vy * dt;
      arr[i*3]   += Math.sin(elapsed*0.8 + sp.data[i].phase) * dt * 0.3;
      if (arr[i*3+1] > sp.maxY) arr[i*3+1] = sp.minY;
    }
    sp.points.geometry.attributes.position.needsUpdate = true;
  }
  // 中庭の蛍
  if (window.__fireflies) {
    const ff = window.__fireflies, arr = ff.points.geometry.attributes.position.array;
    for (let i=0;i<ff.n;i++) {
      arr[i*3]   += Math.sin(elapsed*0.6 + ff.data[i].a) * dt * 0.5;
      arr[i*3+1] += Math.cos(elapsed*0.5 + ff.data[i].b) * dt * 0.3;
      arr[i*3+2] += Math.sin(elapsed*0.7 + ff.data[i].b) * dt * 0.5;
      arr[i*3+1] = Math.max(0.4, Math.min(3.2, arr[i*3+1]));
    }
    ff.points.geometry.attributes.position.needsUpdate = true;
  }
  // 噴水の水面
  if (window.__water) {
    window.__water.material.emissiveIntensity = 0.8 + Math.sin(elapsed*1.4)*0.2;
    window.__water.rotation.z += dt*0.15;
  }

  // 仕掛けアニメーション
  for (let i=animations.length-1;i>=0;i--) {
    if (animations[i].update(dt)) animations.splice(i,1);
  }

  // 風の音: 中庭で強く
  if (windGain && audioOn) {
    const inCourtyard = currentRoom && currentRoom.name === '中庭';
    const target = inCourtyard ? 0.13 : 0.015;
    windGain.gain.value += (target - windGain.gain.value) * dt * 2;
    windFilter.frequency.value = 340 + Math.sin(elapsed*0.5)*120;
  }

  renderer.render(scene, camera);
}

/* =========================================================
   開始
========================================================= */
const startOverlay = document.getElementById('startOverlay');
const startBtn = document.getElementById('startBtn');
document.getElementById('loadingMsg').textContent = '準備完了';

startBtn.addEventListener('click', () => {
  started = true;
  startOverlay.classList.add('hidden');
  initAudio();
  if (actx.state === 'suspended') actx.resume();
  lockPointer();
});

animate();
</script>
